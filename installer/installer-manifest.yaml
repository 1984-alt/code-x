# Code-X installer manifest (PBF-PROP-017) — PINNED trust root.
#
# Every dependency below is bound to an IMMUTABLE release TAG. install.sh builds
# the DOCUMENTED tag-pin add-source — the full git URL plus `#<tag>`, e.g.
# `https://github.com/1984-alt/code-x.git#v1.22.4` — from each dep's
# `marketplace_add_url` + `release_tag` and passes it to `claude plugin
# marketplace add`, so the clone can never silently follow a moving default
# branch. (The bare `owner/repo@tag` shorthand is NOT documented for
# marketplace add and can clone unpinned on some CLI versions — see the
# code-x-installer-fold-v1.22.4 design note.) After cloning, install.sh reads
# the checked-out release's OWN self-declared plugin version and requires it to
# equal this pinned tag — fail-closed, not a warning, on any mismatch, missing
# coordinate, or dirty (locally-edited) checkout.
#
# WHY PINNING EXISTS (xfam P0, PBF-PROP-017 design review): pulling straight from
# each project's official source solves LICENSING/VENDORING exposure (no
# third-party code ships inside Code-X). It does NOT by itself protect against
# upstream drift or a compromised/moved release — that protection comes from
# this file. Any mismatch, disappearance, or unpinned coordinate is a fail-closed
# condition in install.sh, never a soft warning.
#
# WHY NOT A COMMIT SHA (fold v1.22.4, 2026-07-03 — CEO-D-042): marketplace
# sources only support pinning to a branch/tag ref, never a raw commit sha (the
# `claude` CLI has no such option). A release tag is therefore the strongest
# pin the marketplace-add step can actually enforce — see verify_method below.
#
# UPDATE PROCEDURE (manual, deliberate — no auto-pin-bump):
#   1. Decide to move the pin (new upstream release, security fix, etc).
#   2. Confirm the new tag exists at the upstream repo and, for an external
#      dependency like superpowers, what COMMIT it points at — this is now a
#      VERIFIED, ENFORCED coordinate (install.sh's INV-3 check), not merely
#      informational. Get the commit with `git rev-parse <tag>^{commit}` (or
#      `git rev-list -n1 <tag>`) run against a real clone of the tag — NEVER
#      the tag ref's own sha from `git rev-parse <tag>` or from
#      api.github.com's tag-ref JSON. An ANNOTATED tag's ref sha is the
#      TAG-OBJECT, not the commit it points at, and those two shas differ
#      (the fold-2026-07-03 bug: the stored commit_sha was the tag-object
#      sha, which would fail EVERY real install against it). Peel the tag to
#      its commit first, always.
#   3. Edit release_tag (installer/restamp-release.sh does this for code-x,
#      plus install.sh's own embedded bootstrap tag + manifest checksum, all
#      together). Record the change in VERSION-HISTORY.md / a design-history
#      note.
#   4. Re-run installer tests (tests/run-installer-tests.sh) before shipping.

schema_version: 1
generated: "2026-07-03"
generated_by: "Code-X release build (PBF-PROP-017)"

dependencies:
  # code-x itself. Pin policy: SAME-RELEASE-AS-SELF — the installer always ships
  # pinned to the exact code-x release it is packaged inside (documented choice,
  # not a placeholder). release_tag below MUST equal `checkers/cx --version`'s
  # version string — a pinned test enforces this (test_version_parity). No
  # commit_sha field exists for code-x: a release commit cannot contain its own
  # sha (content-addressing), so any value stored here would be stale the
  # instant it was written — that circular self-hash was the fold-v1.22.4 P0
  # bug. installer/restamp-release.sh re-stamps release_tag (+ install.sh's
  # embedded bootstrap tag/checksum) together at every release cut.
  code-x:
    kind: claude_code_plugin_marketplace
    official_source: "https://github.com/1984-alt/code-x"
    # Tag-pinning uses the DOCUMENTED full-git-URL + `#<ref>` form
    # (code.claude.com/docs/en/claude-code/plugin-marketplaces): a bare
    # `owner/repo@tag` shorthand is NOT documented for `marketplace add` and
    # risks a silent unpinned clone on some CLI versions. install.sh appends
    # `#<release_tag>` to this URL.
    marketplace_add_url: "https://github.com/1984-alt/code-x.git"
    # The marketplace NAME comes from the cloned marketplace.json's own `name`
    # field (NOT the repo/URL), and `marketplace list --json` reports it under
    # that name. Verified from the real code-x marketplace.json: "code-x".
    marketplace_name: "code-x"
    plugin_id: "code-x@code-x"
    plugin_name: "code-x"
    pin_policy: "same-release-as-self"
    release_tag: "v1.22.8"
    # install.sh verifies two things: (1) `claude plugin marketplace add
    # https://github.com/1984-alt/code-x.git#v1.22.4` clones this exact tag —
    # never the default branch; (2) the cloned marketplace.json's own
    # self-declared plugin version equals this release_tag (stripped of the
    # leading "v"), plus a clean working tree. That is the strongest check the
    # `claude` CLI's marketplace machinery actually supports — it has no
    # commit-sha pin.
    verify_method: "installed_marketplace_tag_pin_plus_version_parity"

  superpowers:
    kind: claude_code_plugin
    official_source: "https://github.com/obra/superpowers"
    # Same documented full-URL#ref tag-pin form as code-x above.
    marketplace_add_url: "https://github.com/obra/superpowers.git"
    # RUNTIME-VERIFIED 2026-07-03 (real `claude plugin marketplace add
    # https://github.com/obra/superpowers.git#v6.1.1` in a throwaway HOME):
    # the marketplace's OWN declared name is "superpowers-dev" (not
    # "superpowers"), so `marketplace list --json` reports it under that name
    # and the plugin id is "superpowers@superpowers-dev". The clone pinned
    # cleanly to the v6.1.1 tag and self-declared plugin version 6.1.1.
    marketplace_name: "superpowers-dev"
    plugin_id: "superpowers@superpowers-dev"
    plugin_name: "superpowers"
    # documented Claude Code convenience alias also exists:
    # "superpowers@claude-plugins-official" — install.sh prefers the direct
    # GitHub coordinate so the pin below is meaningful and verifiable.
    pin_policy: "pinned-release"
    release_tag: "v6.1.1"
    # ENFORCED when present (council trust-model rebuild, 2026-07-03; INV-3)
    # — install.sh requires `git rev-parse HEAD` at the cloned checkout to
    # equal this value. Unlike code-x's pin, superpowers is an external
    # dependency pinned from outside its own release process, so this is not
    # self-referential/circular the way a code-x self-sha would be.
    #
    # This is the COMMIT the v6.1.1 tag points at — NOT the tag ref's own
    # sha. v6.1.1 is an ANNOTATED tag: `git rev-parse refs/tags/v6.1.1`
    # returns the TAG-OBJECT sha (c984ea2e7aeffdcc865784fd6c5e3ab75da0209a),
    # which is a different object than the commit it points at. The value
    # below was verified 2026-07-03 by cloning the real tag and reading
    # `git rev-parse refs/tags/v6.1.1^{commit}` (== `git rev-parse HEAD`
    # after checkout) — see UPDATE PROCEDURE above; never store the
    # tag-ref/api.github.com value here again.
    commit_sha: "d884ae04edebef577e82ff7c4e143debd0bbec99"
    tarball_url: "https://github.com/obra/superpowers/archive/refs/tags/v6.1.1.tar.gz"
    # No sha256 here (xfam P1 PINNED_SHA256_DEAD_FIELD, 2026-07-03): install.sh
    # never fetches this tarball — `claude plugin marketplace add` does its own
    # `git clone` under the hood, so a tarball checksum has no enforcement point
    # in this script. tarball_url above is kept only as a human reference link,
    # not a verified coordinate.
    verify_method: "installed_marketplace_tag_pin_plus_version_parity_plus_commit_sha"
    fetched_2026-07-03_note: >
      tag->commit re-verified by cloning the real tag (not api.github.com's
      tag-ref JSON) during the council trust-model rebuild (2026-07-03).
      Not a PIN-ME placeholder.

  coderabbit:
    kind: third_party_offer_only
    official_source: "https://docs.coderabbit.ai/cli/overview"
    install_url: "https://cli.coderabbit.ai/install.sh"
    relationship: "works-with"   # NEVER "includes" — no bundling, no endorsement implied
    account_required: true
    auto_install: false          # install.sh NEVER runs this — offer + explain only
    note: >
      CodeRabbit is a proprietary, account-bound third-party service. install.sh
      prints the official install URL and a plain-English note that it needs the
      user's own CodeRabbit account, then moves on. It is never fetched, never
      executed, and a decline never fails the run.

  python3:
    kind: system_prerequisite
    official_source: "https://www.python.org/"
    min_version: "3.10"
    macos_fallback_path: "/opt/homebrew/bin/python3"
    verify_method: "version_probe"

  pyyaml:
    kind: python_package
    official_source: "https://pypi.org/project/PyYAML/"
    verify_method: "import_probe"

  git:
    kind: system_prerequisite
    official_source: "https://git-scm.com/"
    verify_method: "presence_probe"

  claude_cli:
    kind: system_prerequisite
    official_source: "https://github.com/anthropics/claude-code"
    verify_method: "presence_probe"
