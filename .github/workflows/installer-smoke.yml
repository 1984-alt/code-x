# Code-X installer smoke test (PBF-PROP-017).
#
# Runs against the PUBLIC code-x repo layout: installer/ at repo root,
# checkers/cx nested under plugins/code-x/skills/code-x/ (unlike the private
# canon's flat Code-X-V1/ layout). Wired at
# .github/workflows/installer-smoke.yml.
#
# What it proves, in plain English:
#   - The installer works on a clean machine (no prior Code-X install) on both
#     macOS and Linux, installing the REAL code-x + superpowers plugins from
#     their real GitHub marketplaces (this is the runtime proof no offline
#     test can give — installer/tests/run-installer-tests.sh only proves the
#     shell logic against a fake local CLI stub).
#   - After install, the installed plugin's version matches the pin AND the
#     `cx` checker actually runs (not just "a directory got cloned").
#   - Running it twice is safe (the second run does not break or duplicate
#     anything) — the idempotency promise in install.sh.
#   - It correctly REFUSES to proceed when something is wrong: an unresolvable
#     pinned release tag, a missing Python, or the user saying no to
#     CodeRabbit — the first two must fail with a plain message, the third
#     must NOT fail the run.

name: installer-smoke

on:
  push:
    paths:
      - "installer/**"
      - ".github/workflows/installer-smoke.yml"
  pull_request:
    paths:
      - "installer/**"
      - ".github/workflows/installer-smoke.yml"
  workflow_dispatch: {}

jobs:
  clean-install-twice:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Use a clean HOME (simulate a fresh machine)
        run: |
          CLEAN_HOME="${RUNNER_TEMP}/clean-home"
          mkdir -p "$CLEAN_HOME"
          echo "HOME=$CLEAN_HOME" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the Claude Code CLI (native installer, required prerequisite this smoke test does not itself install)
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install PyYAML (required prerequisite the installer does not auto-fetch)
        run: |
          # install.sh fails closed on missing PyYAML rather than auto-running
          # a bare, unpinned `pip install` (xfam P0 UNPINNED_PIP_FETCH) — it
          # prints this exact pinned+hashed command for a human to run by hand.
          # This step runs that same command so the smoke test exercises the
          # real "clean machine with prerequisites met" path, not a shortcut.
          python3 -m pip install --no-binary :all: --require-hashes -r <(printf '%s --hash=sha256:%s\n' "pyyaml==6.0.3" "d76623373421df22fb4cf8817020cbb7ef15c725b9d5e45f17e189bfc384190f")

      - name: First install run (must succeed on a clean machine)
        run: |
          chmod +x installer/install.sh
          ./installer/install.sh

      - name: Verify installed code-x version matches the pinned release tag
        run: |
          # Robust block-scoped extraction (position-independent — a later
          # added comment must not shift the field out of a fixed -A<N> window).
          expected="$(awk '/^  code-x:/{f=1;next} f&&/^  [a-zA-Z]/{f=0} f&&/release_tag:/{print;exit}' installer/installer-manifest.yaml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          claude plugin list --json | python3 -c "import json, sys; data = json.load(sys.stdin); match = [p for p in data if p['id'] == 'code-x@code-x']; assert match, 'code-x@code-x not found in installed plugins after install'; installed = match[0]['version']; expected = '$expected'; assert installed == expected, f'installed code-x version {installed} != pinned release {expected}'; print(f'confirmed: installed code-x version {installed} matches pinned release {expected}')"

      - name: Verify the installed cx checker actually runs (real runtime proof)
        run: |
          # Public repo layout: checkers/cx is nested under
          # plugins/code-x/skills/code-x/ (marketplace source = the cloned
          # code-x repo root), not directly under it.
          loc="$(claude plugin marketplace list --json | python3 -c "import json,sys; d=json.load(sys.stdin); print([m['installLocation'] for m in d if m['name']=='code-x'][0])")"
          "$loc/plugins/code-x/skills/code-x/checkers/cx" --version

      - name: Version-parity gate — marketplace.json + plugin.json == release tag
        run: |
          # Real-user consequence if this drifts: install.sh's version-parity
          # check inside ensure_marketplace_and_plugin fails closed for every
          # real install, because the tagged release's OWN self-declared
          # version would not equal the pinned release_tag.
          expected="$(awk '/^  code-x:/{f=1;next} f&&/^  [a-zA-Z]/{f=0} f&&/release_tag:/{print;exit}' installer/installer-manifest.yaml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          mp_version="$(python3 -c "import json; d=json.load(open('.claude-plugin/marketplace.json')); print([p['version'] for p in d['plugins'] if p['name']=='code-x'][0])")"
          plugin_version="$(python3 -c "import json; print(json.load(open('plugins/code-x/.claude-plugin/plugin.json'))['version'])")"
          echo "release_tag=$expected marketplace.json=$mp_version plugin.json=$plugin_version"
          [ "$mp_version" = "$expected" ] || { echo "marketplace.json version ($mp_version) != release tag ($expected)"; exit 1; }
          [ "$plugin_version" = "$expected" ] || { echo "plugin.json version ($plugin_version) != release tag ($expected)"; exit 1; }
          echo "confirmed: marketplace.json + plugin.json version match release tag $expected"

      - name: Second install run (idempotency proof — must also succeed, no duplication)
        run: |
          ./installer/install.sh

      - name: Assert no duplicate marketplace entries after two runs
        run: |
          claude plugin marketplace list --json | python3 -c "import json, sys, collections; data = json.load(sys.stdin); names = [m['name'] for m in data]; dupes = [n for n, c in collections.Counter(names).items() if c > 1]; assert not dupes, f'duplicate marketplace entries after 2 runs: {dupes}'; print('no duplicate marketplaces — idempotency holds')"

  negative-nonexistent-pinned-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install the Claude Code CLI (native installer)
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install PyYAML (required prerequisite the installer does not auto-fetch)
        run: |
          # Without this, the run below fails closed on missing PyYAML
          # instead of the nonexistent release tag this job is meant to
          # prove — install it so the ONLY remaining failure reason is the
          # corrupted tag, making this a true negative test of that path.
          python3 -m pip install --no-binary :all: --require-hashes -r <(printf '%s --hash=sha256:%s\n' "pyyaml==6.0.3" "d76623373421df22fb4cf8817020cbb7ef15c725b9d5e45f17e189bfc384190f")
      - name: Corrupt the pinned bootstrap release tag and expect a fail-closed exit
        run: |
          # install.sh has exactly ONE manifest trust root (council trust-model
          # rebuild, INV-1): the hardcoded INSTALLER_RELEASE_TAG constant near
          # the top of the script. It ALWAYS fetches installer-manifest.yaml
          # fresh from https://.../<INSTALLER_RELEASE_TAG>/installer/
          # installer-manifest.yaml and never reads a manifest sitting on disk
          # (cwd or beside the script). Editing the checked-out
          # installer/installer-manifest.yaml (the old version of this test)
          # is therefore a no-op — install.sh ignores it and re-fetches the
          # real manifest from the real pinned release regardless. The only
          # way to genuinely exercise "pinned release tag does not exist
          # upstream" is to corrupt install.sh's own INSTALLER_RELEASE_TAG
          # constant — there is no supported env var/flag override for it (by
          # design: INV-1 makes this the one thing a caller must never set).
          chmod +x installer/install.sh
          cp installer/install.sh /tmp/install.sh.bak
          sed -i 's/INSTALLER_RELEASE_TAG="v[0-9.]*"/INSTALLER_RELEASE_TAG="v0.0.1-does-not-exist"/' installer/install.sh
          set +e
          ./installer/install.sh > /tmp/negative-tag-out.log 2>&1
          status=$?
          set -e
          cp /tmp/install.sh.bak installer/install.sh
          cat /tmp/negative-tag-out.log
          if [ "$status" -eq 0 ]; then
            echo "installer should have FAILED on a nonexistent pinned release tag but exited 0"
            exit 1
          fi
          grep -qi "could not fetch installer-manifest.yaml from the pinned release" /tmp/negative-tag-out.log
          echo "confirmed: a pinned release tag that does not exist upstream fails closed (exit $status)"

  negative-missing-python:
    runs-on: ubuntu-latest
    container: debian:bookworm-slim
    steps:
      - uses: actions/checkout@v4
      - name: Run installer with no python3 on PATH — expect nonzero exit + plain-English failure
        run: |
          # curl is required so install.sh gets PAST its curl check (which
          # runs before the python3 check) and actually reaches the
          # python3-missing assertion this test greps for — without curl,
          # the run fails earlier with "curl is unavailable" and this test
          # would go green for the wrong reason.
          apt-get update -qq && apt-get install -y -qq git bash curl >/dev/null
          chmod +x installer/install.sh
          set +e
          PATH="/usr/bin:/bin" ./installer/install.sh > /tmp/out.log 2>&1
          status=$?
          set -e
          cat /tmp/out.log
          if [ "$status" -eq 0 ]; then
            echo "installer should have FAILED with no python3 on PATH but exited 0"
            exit 1
          fi
          grep -qi "python3.*not found" /tmp/out.log
          echo "confirmed: missing python3 fails closed (exit $status) with a plain-English message"

  negative-declined-coderabbit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install the Claude Code CLI (native installer)
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install PyYAML (required prerequisite the installer does not auto-fetch)
        run: |
          # install.sh fails closed on missing PyYAML rather than auto-running
          # a bare, unpinned `pip install` (xfam P0 UNPINNED_PIP_FETCH) — it
          # prints this exact pinned+hashed command for a human to run by hand.
          # This step runs that same command so the smoke test exercises the
          # real "clean machine with prerequisites met" path, not a shortcut.
          python3 -m pip install --no-binary :all: --require-hashes -r <(printf '%s --hash=sha256:%s\n' "pyyaml==6.0.3" "d76623373421df22fb4cf8817020cbb7ef15c725b9d5e45f17e189bfc384190f")
      - name: Run installer with no CodeRabbit interaction — run must still pass
        run: |
          chmod +x installer/install.sh
          ./installer/install.sh
          echo "confirmed: declining/ignoring CodeRabbit does not fail the run"
