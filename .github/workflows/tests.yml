name: tests
on: [push, pull_request]
jobs:
  cx-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Run cx self-tests
        run: python3 plugins/code-x/skills/code-x/checkers/tests/run.py
