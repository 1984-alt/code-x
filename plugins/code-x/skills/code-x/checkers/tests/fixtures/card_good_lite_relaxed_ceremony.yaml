security_tripwire:
  touches_auth: no
  touches_secrets: no
  touches_money_or_balances: no
  touches_bank_or_pii: no
  touches_upload_restore_import: no
  touches_network_or_public_surface: no
  touches_logs_or_error_output: no

loop_budget:
  review_fix_cycles: 1
  verification_passes: 1
  third_review_loop_allowed: false
  self_heal_attempts:
    codex: 3
    claude_cross_family: "4 + final synthesis"

stop_conditions:
  - out-of-scope change detected by scope check
  - secret value found in diff

cost_budget: 40000 tokens estimated

state_update: set current_card=null, next_actor=CEO after PASS

