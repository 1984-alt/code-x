# GOOD frozen module registry, committed INSIDE the frozen packet — 3 ordered modules; m2 dep m1.
# frozen_packet_hash is now a PRESENCE-ONLY marker (a registry inside the packet cannot store the
# hash of the packet that contains it — self-reference). The real binding is content-deep: the
# order wall re-hashes the whole packet dir and requires it == the card's locked_packet_hash, so
# trimming a module HERE changes the recompute and is rejected (V1.10 R4).
module_registry:
  frozen_packet_hash: g1-frozen
  modules:
    - module_id: m1
      title: Money source-of-truth importer (the CEO sees imported transactions)
      requirement_ids: [REQ-001, REQ-002]
      risk_flags: [money, data]
      touches_shared_shell: yes
      dependency_modules: []
      card_ids: [BUILD-001]
      expected_acceptance_artifacts: [live_url, screenshots, quality_card, conformance_diff]
    - module_id: m2
      title: Income reconciliation screen (CEO clicks through a day)
      requirement_ids: [REQ-003]
      risk_flags: [money]
      dependency_modules: [m1]
      card_ids: [BUILD-002]
      expected_acceptance_artifacts: [live_url, screenshots, quality_card, conformance_diff]
    - module_id: m3
      title: Expense category editor (CEO edits a category)
      requirement_ids: [REQ-004]
      risk_flags: [ui]
      dependency_modules: [m2]
      card_ids: [BUILD-003]
      expected_acceptance_artifacts: [live_url, screenshots, quality_card]
