  - id: BLUEPRINT-HIDDEN-SEVERITY-NO-OPEN-FINDINGS
    check: blueprint
    kind: gate
    clause: "CXBP-004: NO-HIDDEN-SEVERITY fails CLOSED when state has no open_findings mapping — a missing tally cannot prove there is no hidden open severity"
    source: "PROP-039 built-code xfam CXBP-004"
    bad:
      args: ["tests/fixtures/blueprint_good_packet", "--module", "home", "--state", "tests/fixtures/blueprint_bad_state_no_open_findings.yaml", "--approval", "tests/fixtures/blueprint_good_approval.yaml"]
