  - id: ANDON-WALL-NO-RECEIPT
    check: module-acceptance
    kind: gate
    clause: "module marked accepted in state with no bound receipt is rejected (P0 Andon wall) [V1.10]"
    source: "Rev d §module_acceptance / Andon receipt"
    bad:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_no_receipt.yaml"]
      expect_severity: P0
      expect_contains: "NO acceptance_ref"
    good:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_good.yaml", "--acceptance", "tests/fixtures/module_acceptance_good.yaml"]

  - id: ANDON-WALL-HASH-MISMATCH
    check: module-acceptance
    kind: gate
    clause: "recorded acceptance_sha12 not matching the receipt file's sha is rejected (P0 forge-proof binding) [V1.10]"
    source: "Rev d §module_acceptance / Andon receipt"
    bad:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_hash_mismatch.yaml", "--acceptance", "tests/fixtures/module_acceptance_good.yaml"]
