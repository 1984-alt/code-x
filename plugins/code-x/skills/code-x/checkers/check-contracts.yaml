  - id: MODULE-START-BLUEPRINT-READY-STANDALONE
    check: module-start
    kind: gate
    clause: "CXBP-006: cx check module-start directly fails at P0 for a module that is not BLUEPRINT-READY (stale approval) — the build-blocker's true severity, distinct from the build-turn aggregator wrapper which surfaces it at its honest P1 rail severity"
    source: "PROP-039 built-code xfam CXBP-006 / EVAL-035"
    git_fixture: build_turn_blueprint_not_ready
