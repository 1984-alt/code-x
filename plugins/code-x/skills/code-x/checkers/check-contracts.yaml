      expect_severity: P1
      expect_contains: "BLUEPRINT-REVIEW-RECEIPT"
    good:
      args: ["tests/fixtures/blueprint_good_packet", "--module", "home", "--state", "tests/fixtures/blueprint_good_state.yaml", "--approval", "tests/fixtures/blueprint_good_approval.yaml"]

  - id: BLUEPRINT-NO-HIDDEN-SEVERITY
    check: blueprint
    kind: gate
    clause: "requires --state; no open P0–P3 mapped to the module (fail-closed to global findings when attribution is absent) (P1-6)"
    source: "MASTER-BLUEPRINT.md / EVALS.md EVAL-035 / PROP-039 §3.8"
    bad:
      args: ["tests/fixtures/blueprint_good_packet", "--module", "home", "--state", "tests/fixtures/blueprint_bad_hidden_severity_state.yaml", "--approval", "tests/fixtures/blueprint_good_approval.yaml"]
      expect_severity: P1
      expect_contains: "BLUEPRINT-NO-HIDDEN-SEVERITY"
    good:
      args: ["tests/fixtures/blueprint_good_packet", "--module", "home", "--state", "tests/fixtures/blueprint_good_state.yaml", "--approval", "tests/fixtures/blueprint_good_approval.yaml"]

  - id: BLUEPRINT-PER-KIND-FIELDS
    check: blueprint
    kind: gate
    clause: "required field set enforced per kind; a screen-only field N/A on shared_logic must carry an explicit reason, never a silent skip (P2-3)"
    source: "MASTER-BLUEPRINT.md / EVALS.md EVAL-035 / PROP-039 §3.1"
    bad:
      args: ["tests/fixtures/blueprint_bad_per_kind_packet", "--module", "rounding", "--state", "tests/fixtures/blueprint_good_state.yaml", "--approval", "tests/fixtures/blueprint_bad_per_kind_packet_approval.yaml"]
      expect_severity: P1
      expect_contains: "BLUEPRINT-PER-KIND-FIELDS"
    good:
      args: ["tests/fixtures/blueprint_good_packet", "--module", "rounding", "--state", "tests/fixtures/blueprint_good_state.yaml", "--approval", "tests/fixtures/blueprint_good_approval.yaml"]

  # ── packet-floor (cx check packet) — registry coverage before freeze (P1-7) ──

  - id: PACKET-MODULE-REGISTRY-COVERS-SCREENS
    check: packet
    kind: gate
    clause: "the planning MODULE-REGISTRY must cover every screen in screens-manifest before the packet freezes — an uncovered screen drifts unbuilt (PROP-039 P1-7)"
    source: "PACKET-CONTENTS.md / PROP-039 §5.2"
    bad:
      args: ["tests/fixtures/packet_bad_registry_missing_screen"]
      expect_severity: P1
      expect_contains: "PACKET-MODULE-REGISTRY-COVERS-SCREENS"
    good:
      args: ["tests/fixtures/packet_good"]

  - id: PACKET-MODULE-REGISTRY-COVERS-REQUIREMENTS
    check: packet
    kind: gate
    clause: "the planning MODULE-REGISTRY must cover every BUILDING requirement id before the packet freezes — an uncovered requirement has no module to build it (PROP-039 P1-7)"
    source: "PACKET-CONTENTS.md / PROP-039 §5.2"
    bad:
      args: ["tests/fixtures/packet_bad_registry_missing_requirement"]
      expect_severity: P1
      expect_contains: "PACKET-MODULE-REGISTRY-COVERS-REQUIREMENTS"
    good:
      args: ["tests/fixtures/packet_good"]

  # ── order-wall rider (proven THROUGH build-turn, P2-1) ──

  - id: MODULE-START-BLUEPRINT-READY
    check: build-turn
    kind: gate
    clause: "a MODULE/MODE_A card whose target module is NOT BLUEPRINT-READY (stale/missing blueprint approval) is BLOCKED via cx check module-start at build-turn — the build-blocker rides the order wall, not a new gate family (PROP-039 P2-1)"
    source: "MASTER-BLUEPRINT.md / GATES.md / PROP-039 §5.2"
    git_fixture: build_turn_blueprint_not_ready
    bad:
      args: ["{REPO}/card.yaml", "--state", "{STATE}", "--repo-root", "{REPO}"]
      expect_severity: P1
      expect_contains: "module-start"
    good:
      git_fixture: build_turn_blueprint_ready
      args: ["{REPO}/card.yaml", "--state", "{STATE}", "--repo-root", "{REPO}"]

  # ──────────────────────────────────────────────────────────────
  # check: blueprint — built-code xfam fold (CXBP-001, -003, -004)
  # ──────────────────────────────────────────────────────────────

  - id: BLUEPRINT-COVERAGE-OMITTED-CONTROL
    check: blueprint
    kind: gate
    clause: "CXBP-001: expected controls are derived from the INDEPENDENT behaviour-contracts source, not the manifest field being validated — a manifest that OMITS a control the contracts source declares fails coverage (closes the circularity)"
    source: "PROP-039 built-code xfam CXBP-001"
    bad:
      args: ["tests/fixtures/blueprint_bad_omit_control_packet", "--module", "home", "--state", "tests/fixtures/blueprint_good_state.yaml", "--approval", "tests/fixtures/blueprint_bad_omit_control_packet_approval.yaml"]
      expect_severity: P0
      expect_contains: "control:add_entry"
    good:
      args: ["tests/fixtures/blueprint_good_packet", "--module", "home", "--state", "tests/fixtures/blueprint_good_state.yaml", "--approval", "tests/fixtures/blueprint_good_approval.yaml"]

  - id: BLUEPRINT-COVERAGE-OMITTED-NAV
    check: blueprint
    kind: gate
    clause: "CXBP-001: expected nav edges are derived from the INDEPENDENT screens-manifest, not the manifest field being validated — a manifest that OMITS a nav edge the screens-manifest declares fails coverage"
    source: "PROP-039 built-code xfam CXBP-001"
    bad:
      args: ["tests/fixtures/blueprint_bad_omit_nav_packet", "--module", "home", "--state", "tests/fixtures/blueprint_good_state.yaml", "--approval", "tests/fixtures/blueprint_bad_omit_nav_packet_approval.yaml"]
