  - id: ANDON-WALL-NO-RECEIPT
    check: module-acceptance
    kind: gate
    clause: "module marked accepted in state with no bound receipt is rejected (P0 Andon wall) [V1.10]"
    source: "Rev d §module_acceptance / Andon receipt"
    bad:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_no_receipt.yaml"]
      expect_severity: P0
      expect_contains: "NO acceptance_ref"
    good:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_good.yaml", "--acceptance", "tests/fixtures/module_acceptance_good.yaml"]

  - id: ANDON-WALL-HASH-MISMATCH
    check: module-acceptance
    kind: gate
    clause: "recorded acceptance_sha12 not matching the receipt file's sha is rejected (P0 forge-proof binding) [V1.10]"
    source: "Rev d §module_acceptance / Andon receipt"
    bad:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_hash_mismatch.yaml", "--acceptance", "tests/fixtures/module_acceptance_good.yaml"]
      expect_severity: P0
      expect_contains: "hash mismatch"
    good:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_good.yaml", "--acceptance", "tests/fixtures/module_acceptance_good.yaml"]

  - id: ANDON-WALL-MALFORMED-FIELDS
    check: module-acceptance
    kind: gate
    clause: "acceptance receipt fields must be STRINGS — a malformed non-scalar (list/mapping) value (e.g. generated_by: [null], quality_card_hash: {x: y}) is treated as absent so the presence checks fail closed; str-coercion used to let malformed values satisfy them (P0) [V1.10 R4]"
    source: "GPT R12 cross-review P0 (type-coercion of malformed receipt fields)"
    bad:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_malformed.yaml", "--acceptance", "tests/fixtures/module_acceptance_malformed_fields.yaml"]
      expect_severity: P0
      expect_contains: "generated_by"
    good:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_good.yaml", "--acceptance", "tests/fixtures/module_acceptance_good.yaml"]

  - id: ANDON-WALL-EXTERNAL-REF
    check: module-acceptance
    kind: gate
    clause: "the recorded acceptance_ref must be a repo-relative, non-symlink path resolving INSIDE the repo — an absolute / '..' / symlink / outside-repo ref would let the Andon wall read arbitrary external bytes as the receipt (P0) [V1.10 R4]"
    source: "GPT R11 cross-review P0 (external acceptance_ref path-safety)"
    git_fixture: module_acceptance_external_ref
    bad:
      args: ["--module-id=m1", "--state", "{STATE}", "--repo-root", "{REPO}"]
      expect_severity: P0
      expect_contains: "repo-relative"
    good:
      git_fixture: module_acceptance_inrepo_ref
      args: ["--module-id=m1", "--state", "{STATE}", "--repo-root", "{REPO}"]

  - id: ANDON-WALL-NO-MODULE-ID
    check: module-acceptance
    kind: gate
    clause: "a sha-bound acceptance receipt that OMITS module_id is rejected — it does not identify the module it accepts, so a module-less bound blob would 'accept' ANY module (enforced-path order-wall bypass); the receipt's module_id must be present and match (P0) [V1.10 R4]"
    source: "GPT R10 cross-review P0 (module-less acceptance receipt)"
    bad:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_no_module_id.yaml", "--acceptance", "tests/fixtures/module_acceptance_no_module_id.yaml"]
      expect_severity: P0
      expect_contains: "no module_id"
    good:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_good.yaml", "--acceptance", "tests/fixtures/module_acceptance_good.yaml"]

  - id: ANDON-WALL-VERDICT-NOT-ACCEPTED
    check: module-acceptance
    kind: gate
    clause: "acceptance receipt whose verdict is not 'accepted' does not unlock the next module (P0) [V1.10]"
    source: "Rev d §module_acceptance / Andon receipt"
    bad:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_pending.yaml", "--acceptance", "tests/fixtures/module_acceptance_bad_verdict_pending.yaml"]
      expect_severity: P0
      expect_contains: "not 'accepted'"
    good:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_good.yaml", "--acceptance", "tests/fixtures/module_acceptance_good.yaml"]

  # BF-PROP-006 — phantom-completion guard at the module-acceptance Andon wall (2026-06-19, pre-review)
  - id: PROP-028-NO-REPO-SHA
    check: module-acceptance
    kind: gate
    clause: "a module-acceptance receipt missing repo_sha_before (and with no typed legacy_no_baseline carve-out) is rejected — the build-baseline binding needed to prove a real change shipped is absent (P1) [BF-PROP-006]"
    source: "BF-PROP-006 §phantom-completion guard / repo_sha_before"
    bad:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_no_repo_sha.yaml", "--acceptance", "tests/fixtures/module_acceptance_bad_no_repo_sha.yaml"]
      expect_severity: P1
      expect_contains: "missing repo_sha_before"
    good:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_good.yaml", "--acceptance", "tests/fixtures/module_acceptance_good.yaml"]

  - id: PROP-028-MALFORMED-REPO-SHA
    check: module-acceptance
    kind: gate
    clause: "a module-acceptance receipt whose repo_sha_before is malformed (not hex / <12 chars) is rejected — the build-baseline binding is unusable so the phantom-completion guard cannot run (P1) [BF-PROP-006]"
    source: "BF-PROP-006 §phantom-completion guard / repo_sha_before"
    bad:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_malformed_repo_sha.yaml", "--acceptance", "tests/fixtures/module_acceptance_bad_malformed_repo_sha.yaml"]
      expect_severity: P1
      expect_contains: "repo_sha_before malformed"
    good:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_good.yaml", "--acceptance", "tests/fixtures/module_acceptance_good.yaml"]

  # B-PROP-013 Unit 1 forge-parity GUARD (design-history/b-prop-013-forge-parity-design-2026-07-06.md
  # §2/§7): formalizes the guard's clauses into the bite harness — a prior builder proved these via
  # checkers/tests/run.py unit tests ONLY, which run_contracts.py does not count (green != enforcing).
  - id: MODULE-ACCEPTANCE-REPO-SHA-NOT-A-COMMIT-VERIFY-APP
    check: module-acceptance
    kind: gate
    clause: "verify_app.repo_sha that is hex-shaped but NOT a real/reachable commit is fabrication — must not grade lighter than an empty field (P0) [B-PROP-013 §2a/§5]"
    source: "B-PROP-013 §2a (forge-parity acceptance recompute)"
    git_fixture: forge_parity_bad_verify_app
    bad:
      args: ["--module-id=m1", "--state", "{STATE}", "--repo-root", "{REPO}"]
      expect_severity: P0
      expect_contains: "MODULE-ACCEPTANCE-REPO-SHA-NOT-A-COMMIT"
    good:
      git_fixture: forge_parity_good
      args: ["--module-id=m1", "--state", "{STATE}", "--repo-root", "{REPO}"]

  - id: MODULE-ACCEPTANCE-REPO-SHA-NOT-A-COMMIT-NOT-ANCESTOR
    check: module-acceptance
    kind: gate
    clause: "verify_app.repo_sha that is a REAL, existing commit on a side branch (never merged) but is NOT an ancestor of HEAD still fails — reachability means ANCESTRY, not mere git-object existence (P0) [B-PROP-013 §2a/§5, xfam FIX-FIRST]"
    source: "B-PROP-013 §2a (forge-parity acceptance recompute, FIX-FIRST P1 — cat-file -e only checked object existence)"
    git_fixture: forge_parity_bad_verify_app_not_ancestor
    bad:
      args: ["--module-id=m1", "--state", "{STATE}", "--repo-root", "{REPO}"]
      expect_severity: P0
      expect_contains: "MODULE-ACCEPTANCE-REPO-SHA-NOT-A-COMMIT"
    good:
      git_fixture: forge_parity_good
      args: ["--module-id=m1", "--state", "{STATE}", "--repo-root", "{REPO}"]

  - id: MODULE-ACCEPTANCE-REPO-SHA-NOT-A-COMMIT-MODULE-DEMO
    check: module-acceptance
    kind: gate
    clause: "module_demo.repo_sha that is hex-shaped but NOT a real/reachable commit is fabrication (P0) [B-PROP-013 §2a/§5]"
    source: "B-PROP-013 §2a (forge-parity acceptance recompute)"
    git_fixture: forge_parity_bad_module_demo
    bad:
