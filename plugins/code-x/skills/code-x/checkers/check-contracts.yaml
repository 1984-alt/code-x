  - id: GRADUATION-STREAK-UNPROVEN
    check: graduation
    kind: gate
    clause: "THE GATE — under --authorize-decision, a recomputed consecutive-clean streak below N (or fewer than M user-facing) blocks authorization P0; also fires on a missing/unmatched decision row or a pending entry newer than the counted streak (EVAL-041 R1.1)"
