  - id: MODULE-START-REGISTRY-IDENTITY
    check: module-start
    kind: gate
    clause: "registry IDENTITY binding (closes the GPT R4 P0): a packet may contain other registry-shaped files, but the order wall reads ONLY the canonical <packet-dir>/MODULE-REGISTRY.yaml — selecting an ALTERNATE trimmed registry that is itself INSIDE the content-verified packet (so the content hash still matches) is rejected (P0) [V1.10 R4]"
