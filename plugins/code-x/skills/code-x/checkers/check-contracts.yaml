  # v1.10 — module_acceptance gate family fold (2026-06-13); v1.10 clauses tagged `source: Rev d`, tallied in VERSION-HISTORY (115→128)
  - id: SELF-REVIEW-FIX-CYCLES-CAP-3
    check: card
    kind: gate
    clause: "SELF_REVIEW card may run review_fix_cycles up to 3 (bounded model-escalation loop); >3 rejected [V1.10]"
    source: "Rev d §self-review / Reconciliation 1"
    bad:
