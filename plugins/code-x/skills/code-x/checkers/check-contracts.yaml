      args: ["--module-id=m1", "--state", "{STATE}", "--repo-root", "{REPO}"]

  - id: MODULE-ACCEPTANCE-FORGE-PARITY-MARKER-MALFORMED
    check: module-acceptance
    kind: gate
    clause: "b_prop_013_forge_parity present but not a real boolean true (e.g. a quoted \"true\") fails closed — a botched opt-in must not silently fall to the legacy carve-out that genuine absence gets (P1) [B-PROP-013 §4/§7]"
    source: "B-PROP-013 §4 (forge-parity acceptance recompute)"
    git_fixture: forge_parity_bad_marker_malformed
    bad:
      args: ["--module-id=m1", "--state", "{STATE}", "--repo-root", "{REPO}"]
      expect_severity: P1
      expect_contains: "MODULE-ACCEPTANCE-FORGE-PARITY-MARKER-MALFORMED"
    good:
