  # ── EVAL-041 orchestrator self-review adds (2026-07-01): regression-LOCK each false-green path the
  #    GPT-5.5 pre-build review flagged (P0-1 pending-newer, P0-3 auth marker) + the historical
  #    criteria (c5/c6) + the vacuous-green status path. Built-code bite-proven manually at build; these
  #    blocks put them in the automated harness so a future edit can never silently reintroduce a
  #    false-green. Distinct test-ids, same emitted clause; matched to real output substrings. ──

  - id: GRADUATION-AUTH-MARKER-UNMATCHED
    check: graduation
    kind: gate
    clause: "under --authorize-decision, a decision id whose row EXISTS but whose text does NOT match the milestone marker cannot authorize — P0, never vacuous-green (EVAL-041 R1.1.1, pre-build P0-3)"
    source: "design-history/eval041-reliability-bar-graduation-gate-spec-2026-07-01.md R1.1"
    bad:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_no_marker.md", "--authorize-decision", "CEO-D-999"]
      expect_severity: P0
      expect_contains: "does not match the milestone marker"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-AUTH-DECISION-MISSING
    check: graduation
    kind: gate
    clause: "under --authorize-decision, a decision id with NO row in the decision ledger cannot authorize — P0 fail-closed, never vacuous-green (EVAL-041 R1.1.1, pre-build P0-3)"
    source: "design-history/eval041-reliability-bar-graduation-gate-spec-2026-07-01.md R1.1"
    bad:
