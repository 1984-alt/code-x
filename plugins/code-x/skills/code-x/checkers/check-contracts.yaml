    check: module-start
    kind: gate
    clause: "a frozen packet must be SELF-CONTAINED: the canonical <packet>/MODULE-REGISTRY.yaml (or any file under the packet) being a SYMLINK is rejected — following it would hash the target's bytes and read the order from OUTSIDE the packet, defeating both the content binding and the canonical-identity check (P0) [V1.10 R4]"
