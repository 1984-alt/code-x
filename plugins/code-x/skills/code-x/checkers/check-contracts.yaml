      expect_contains: "has no row in the decision ledger"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-STREAK-PENDING-NEWER
    check: graduation
    kind: gate
    clause: "under --authorize-decision, a pending entry (post-ship window still open) NEWER than the counted streak blocks authorization P0 — authorizing while the most recent work is unproven is the premature-authorization risk (EVAL-041 R1.1.3, pre-build P0-1)"
    source: "design-history/eval041-reliability-bar-graduation-gate-spec-2026-07-01.md R1.1"
    bad:
      args: ["--ledger", "tests/fixtures/graduation_bad_pending_newer.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]
      expect_severity: P0
      expect_contains: "a pending entry (post-ship window still open) is newer"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-CRITERION-C5-WINDOW
    check: graduation
    kind: gate
    clause: "criterion 5 (zero post-ship P0/P1) re-derives UNMET when the CLOSED-window incident ledger records a P0/P1 dated inside the window for that build_tag — a historical fact a current-state receipt cannot prove (EVAL-041 R1.0/R1.2, pre-build P0-5)"
    source: "design-history/eval041-reliability-bar-graduation-gate-spec-2026-07-01.md R1.2"
    bad:
      args: ["--ledger", "tests/fixtures/graduation_bad_crit5_inwindow.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]
      expect_severity: P1
      expect_contains: "post-ship window"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-CRITERION-C6-FIRSTPASS
    check: graduation
    kind: gate
    clause: "criterion 6 (final-ready clean on FIRST pass) re-derives UNMET when the attempt-1 final-ready snapshot does not itself re-derive READY — a fail-then-pass history a current-state receipt cannot prove (EVAL-041 R1.0/R1.2, pre-build P0-6)"
    source: "design-history/eval041-reliability-bar-graduation-gate-spec-2026-07-01.md R1.2"
    bad:
      args: ["--ledger", "tests/fixtures/graduation_bad_crit6_notready.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]
      expect_severity: P1
      expect_contains: "attempt-1 final-ready snapshot does NOT re-derive READY"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-STATUS-VACUOUS-GREEN
    check: graduation
    kind: gate
    clause: "status mode (no --authorize-decision) over an all-clean ledger is informational and exits 0 (the ONLY vacuous-green path; proves the dormant gate stays free until authorization is requested) (EVAL-041 R1.1)"
    source: "design-history/eval041-reliability-bar-graduation-gate-spec-2026-07-01.md R1.1"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good.md", "--status"]

  # ── REVISION R2 (post-build cross-family CODE review, 2026-07-01): regression-LOCK each
  #    criterion-level/parser hole the GPT-5.5 post-build review flagged — c3/c4/c7 accepting thin
  #    evidence, c5 shape gaps, the decision-ledger fence hole, a vanishing malformed entry, and the
  #    naive-timestamp ordering crash risk. Distinct test-ids, same underlying wall labels. ──

  - id: GRADUATION-CRITERION-C3-SIDECAR
    check: graduation
    kind: gate
    clause: "criterion 3 (zero design/fidelity drift) requires each fidelity block to name a real, manifest-hash-bound sidecar_ref — a bare hand-typed {verdict: PASS} summary with no sidecar is UNMET, never a vacuous pass (EVAL-041 R2.1 finding #4)"
    source: "design-history/eval041-reliability-bar-graduation-gate-spec-2026-07-01.md R2.1"
    bad:
      args: ["--ledger", "tests/fixtures/graduation_bad_c3_nosidecar.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]
      expect_severity: P1
      expect_contains: "c3 'design_fidelity' sidecar_ref '(absent)' missing/blank sidecar ref"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-CRITERION-C4-DIRREF
    check: graduation
    kind: gate
    clause: "criterion 4 (matched blueprint) requires the packet/approval/state/review anchor refs the reader needs, manifest-hash-bound — any one absent is UNMET (EVAL-041 R2.1 finding #4)"
    source: "design-history/eval041-reliability-bar-graduation-gate-spec-2026-07-01.md R2.1"
    bad:
      args: ["--ledger", "tests/fixtures/graduation_bad_c4_nodir.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]
      expect_severity: P1
      expect_contains: "c4 'dir_refs' is missing one of ('packet', 'approval', 'state', 'review')"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-CRITERION-C5-SHAPE
    check: graduation
    kind: gate
    clause: "criterion 5's closed-window incident artifact must carry a non-blank build_tag AND an explicit 'rows' list — a blank build_tag or missing 'rows' key is malformed, never a valid zero-incidents declaration (EVAL-041 R2.2)"
    source: "design-history/eval041-reliability-bar-graduation-gate-spec-2026-07-01.md R2.2"
    bad:
      args: ["--ledger", "tests/fixtures/graduation_bad_c5_malformed.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]
      expect_severity: P1
      expect_contains: "c5 'build_tag' is missing/blank"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-CRITERION-C7-EMPTY-MODULES
    check: graduation
    kind: gate
    clause: "criterion 7's 'modules' list must be NON-EMPTY — a coderabbit receipt alone cannot vacuously prove the review pipeline ran over zero modules (EVAL-041 R2.1 finding #4)"
    source: "design-history/eval041-reliability-bar-graduation-gate-spec-2026-07-01.md R2.1"
    bad:
      args: ["--ledger", "tests/fixtures/graduation_bad_c7_empty_modules.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]
      expect_severity: P1
      expect_contains: "c7 has an empty/missing 'modules' list"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-PARSER-MISSING-PROJECT-ID
    check: graduation
    kind: gate
    clause: "a ```yaml ledger item carrying ship_commit/ship_date/ship_timestamp_utc/criteria (ledger-shaped) but missing project_id surfaces as an unparseable WALL, never a silent vanish (a vanished newest-dirty entry would let the prior clean entries authorize unopposed) (EVAL-041 R2.4)"
    source: "design-history/eval041-reliability-bar-graduation-gate-spec-2026-07-01.md R2.4"
    bad:
      args: ["--ledger", "tests/fixtures/graduation_bad_parser_no_projectid.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]
      expect_severity: P1
      expect_contains: "could not be parsed as a ledger entry"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-DECISION-MARKER-FENCED
    check: graduation
    kind: gate
    clause: "the decision-ledger scan ignores lines inside fenced ``` code blocks and restricts matching to the real '## Decisions' table's decision-text cell — a marker-bearing row that exists ONLY inside a fenced example can never authorize (EVAL-041 R2.3)"
    source: "design-history/eval041-reliability-bar-graduation-gate-spec-2026-07-01.md R2.3"
    bad:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_marker_in_fence.md", "--authorize-decision", "CEO-D-901"]
      expect_severity: P0
      expect_contains: "does not match the milestone marker"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-TIMESTAMP-NAIVE
    check: graduation
    kind: gate
    clause: "ship_timestamp_utc must be a timezone-aware datetime — a naive value is rejected (GRADUATION-ENTRY-SHAPE), never silently assumed UTC, so a naive/aware mix can never reach the streak sort's comparison (EVAL-041 R2.6)"
    source: "design-history/eval041-reliability-bar-graduation-gate-spec-2026-07-01.md R2.6"
    bad:
      args: ["--ledger", "tests/fixtures/graduation_bad_naive_timestamp.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]
      expect_severity: P1
      expect_contains: "ship_timestamp_utc must be a timezone-aware ISO-8601 datetime"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  # ── PBF-PROP-019 Phase 4 (design v2 P1-5): hash-bound tier evidence + LITE streak exclusion.
  #    FAIL-CLOSED DIRECTION IS THE OPPOSITE of the packet resolver (cx_common.resolve_risk_tier
  #    defaults an absent tier to STRICT): here, missing/unbindable/malformed tier evidence
  #    REJECTS the entry from the streak (P0), never defaults it to STRICT-and-counted. The
  #    LITE-population-exclusion mechanic itself (a verified-LITE entry neither counts nor resets
  #    the streak, even interleaved between STANDARD entries) is unit-proven precisely against
  #    `_recompute_streak`/`_validate_tier_evidence` directly in run.py
  #    (TestGraduationTierEvidence / TestGraduationLiteStreakExclusion) — the CLI harness here
  #    proves the three P0 rejection paths bite end-to-end. ──

  - id: GRADUATION-TIER-EVIDENCE-MISSING
    check: graduation
    kind: gate
    clause: "an entry with no risk_tier field (or blank/unknown value) is REJECTED from the streak population P0 — a graduation entry may never be silent on tier, never defaulted to STRICT-and-counted (PBF-PROP-019 Phase 4, design v2 P1-5)"
    source: "design-history/pbf-prop-019-tiered-strictness-2026-07-03.md Design Resolution v2 P1-5"
    bad:
      args: ["--ledger", "tests/fixtures/graduation_bad_tier_missing.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]
      expect_severity: P0
      expect_contains: "GRADUATION-TIER-EVIDENCE-REQUIRED: entry 'proj-gamma' 'risk_tier' is missing/blank"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-TIER-EVIDENCE-UNBOUND
    check: graduation
    kind: gate
    clause: "an entry's tier_evidence.receipt_sha256 that does not match its own evidence manifest's declared hash for that receipt is an unbindable tier claim — P0, mirrors the criteria-receipt manifest cross-check (PBF-PROP-019 Phase 4, design v2 P1-5)"
    source: "design-history/pbf-prop-019-tiered-strictness-2026-07-03.md Design Resolution v2 P1-5"
    bad:
      args: ["--ledger", "tests/fixtures/graduation_bad_tier_unbound.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]
      expect_severity: P0
      expect_contains: "tier_evidence receipt 'graduation_receipts/clean/tier-standard.yaml' is absent from (or hash-mismatched in)"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-TIER-EVIDENCE-MISMATCH
    check: graduation
    kind: gate
    clause: "a declared risk_tier: STANDARD/STRICT whose hash-bound tier receipt asserts the packet actually resolved to LITE is REJECTED P0 — the LITE->STANDARD migration guard: a later tier claim cannot retroactively bank a run built under a lighter tier (PBF-PROP-019 Phase 4, design v2 P1-5)"
    source: "design-history/pbf-prop-019-tiered-strictness-2026-07-03.md Design Resolution v2 P1-5"
    bad:
      args: ["--ledger", "tests/fixtures/graduation_bad_tier_mismatch.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]
      expect_severity: P0
      expect_contains: "cannot retroactively bank a run built under a lighter tier"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-LITE-EXCLUDED-STATUS-READOUT
    check: graduation
    kind: gate
    clause: "a verified-LITE entry interleaved between STANDARD entries prints as excluded (○, GRADUATION-LITE-EXCLUDED) in the --status readout and the streak counts only the STANDARD entries either side — exact streak arithmetic is unit-proven against _recompute_streak directly (run.py TestGraduationLiteStreakExclusion); this clause proves the CLI path renders it without crashing (PBF-PROP-019 Phase 4, design v2 §5/P1-5)"
    source: "design-history/pbf-prop-019-tiered-strictness-2026-07-03.md Design Resolution v2 §5"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_lite_interleaved.md", "--status"]

  # ──────────────────────────────────────────────────────────────
  # check: audit / packet  (A-PROP-001 + PBAF-PROP-001 — the Audit stage + SOP bind)
  # 12 clauses (9 original + 2 F2 hard-rule fixes + 1 F7 final-xfam-required, v1.22 self-review);
  # each pinned BAD fixture fails closed at the stated severity (so green = enforcing). A 13th
  # AUDIT-STAGE-* clause (AUDIT-STAGE-FINAL-READY-CHAIN, F1 fix) lives in the check: final-ready
  # section above — it wires audit into the final-ready chain itself, not this checker's own
  # report judgment.
  # ──────────────────────────────────────────────────────────────

  - id: AUDIT-STAGE-ENTRY-REQUIRED
    check: audit
    kind: gate
    clause: "a build that reaches final-ready with no audit receipt for the Audit stage skipped the stage entirely (A-PROP-001 Lever A)"
    source: A-PROP-001 §3 Lever A
    bad:
      args: ["tests/fixtures/as_no_audit_receipt", "--state", "tests/fixtures/audit_state_good.yaml"]
      expect_severity: P1
      expect_contains: "AUDIT-STAGE-ENTRY-REQUIRED"
    good:
      args: ["tests/fixtures/audit_good", "--state", "tests/fixtures/audit_state_good.yaml"]

  - id: AUDIT-STAGE-APPLICABILITY-DERIVED
    check: audit
    kind: gate
    clause: "an audit whose angle-D scope names a layer N/A without the driving build-fact (A1-A9) recorded is asserting N/A by opinion, not derivation (PBAF-PROP-001 Rule 1)"
    source: PBAF-PROP-001 §3 Lever B · Rule 1
    bad:
      args: ["tests/fixtures/as_na_no_fact", "--state", "tests/fixtures/audit_state_good.yaml"]
      expect_severity: P1
      expect_contains: "AUDIT-STAGE-APPLICABILITY-DERIVED"
    good:
      args: ["tests/fixtures/audit_good", "--state", "tests/fixtures/audit_state_good.yaml"]

  - id: AUDIT-STAGE-WHOLE-LAYER-NA-WITH-LIVE-SUBITEM
    check: audit
    kind: gate
    clause: "a whole layer marked N/A while any of its sub-items is applicable under the recorded facts drops a mandatory sub-item (PBAF-PROP-001 Rule 2 — per sub-item, not per layer)"
    source: PBAF-PROP-001 §3 Lever D · Rule 2
    bad:
      args: ["tests/fixtures/as_layer_na_live_subitem", "--state", "tests/fixtures/audit_state_good.yaml"]
      expect_severity: P1
      expect_contains: "AUDIT-STAGE-WHOLE-LAYER-NA-WITH-LIVE-SUBITEM"
    good:
      args: ["tests/fixtures/audit_good", "--state", "tests/fixtures/audit_state_good.yaml"]

  - id: AUDIT-STAGE-SHIPGATE-DISPOSITION
    check: audit
    kind: gate
    clause: "an applicable SOP ship-gate sub-item with no disposition (pass / fix / CEO-waive) leaves a live standard unproven (A-PROP-001 Lever C)"
    source: A-PROP-001 §3 Lever C
    bad:
      args: ["tests/fixtures/as_undispositioned_item", "--state", "tests/fixtures/audit_state_good.yaml"]
      expect_severity: P1
      expect_contains: "AUDIT-STAGE-SHIPGATE-DISPOSITION"
    good:
      args: ["tests/fixtures/audit_good", "--state", "tests/fixtures/audit_state_good.yaml"]

  - id: AUDIT-STAGE-XFAM-RECEIPT
    check: audit
    kind: gate
    clause: "an audit receipt authored by the same model family as the builder is not a cross-family audit (A-PROP-001 Lever D)"
    source: A-PROP-001 §3 Lever D
    bad:
      args: ["tests/fixtures/as_samefamily_receipt", "--state", "tests/fixtures/audit_state_good.yaml"]
      expect_severity: P1
      expect_contains: "AUDIT-STAGE-XFAM-RECEIPT"
    good:
      args: ["tests/fixtures/audit_good", "--state", "tests/fixtures/audit_state_good.yaml"]

  - id: AUDIT-STAGE-REVIEW-LADDER
    check: audit
    kind: gate
    clause: "a cross-family audit receipt not preceded, in order, by a CodeRabbit review receipt and a same-family self-review receipt skips the ratified review ladder — CodeRabbit -> self-review -> cross-family (A-PROP-001 Lever D · CEO 2026-06-28)"
    source: A-PROP-001 §3 Lever D
    bad:
      args: ["tests/fixtures/as_ladder_skip", "--state", "tests/fixtures/audit_state_good.yaml"]
      expect_severity: P1
      expect_contains: "AUDIT-STAGE-REVIEW-LADDER"
    good:
      args: ["tests/fixtures/audit_good", "--state", "tests/fixtures/audit_state_good.yaml"]

  - id: AUDIT-STAGE-FAILCLOSED-FINAL
    check: audit
    kind: gate
    clause: "a final audit that reaches final-ready with an unresolved applicable ship-gate item is forward-shipping a known standard failure (A-PROP-001 Lever E)"
    source: A-PROP-001 §3 Lever E
    bad:
      args: ["tests/fixtures/as_final_unresolved", "--state", "tests/fixtures/audit_state_good.yaml", "--final"]
      expect_severity: P1
      expect_contains: "AUDIT-STAGE-FAILCLOSED-FINAL"
    good:
      args: ["tests/fixtures/as_final_good", "--state", "tests/fixtures/audit_state_good.yaml", "--final"]

  - id: AUDIT-STAGE-HTTPS-E2
    check: audit
    kind: gate
    clause: "an app at exposure tier E2 or higher (reachable over any network) with the HTTPS ship-gate sub-item marked N/A violates the locked hard rule — HTTPS is mandatory at E2+ (PBAF-PROP-001 Lever E)"
    source: PBAF-PROP-001 §3 Lever E
    bad:
      args: ["tests/fixtures/as_e2_no_https", "--state", "tests/fixtures/audit_state_good.yaml"]
      expect_severity: P1
      expect_contains: "AUDIT-STAGE-HTTPS-E2"
    good:
      args: ["tests/fixtures/audit_good", "--state", "tests/fixtures/audit_state_good.yaml"]

  - id: AUDIT-STAGE-VERSION-CONTROL-ALWAYS
    check: audit
    kind: gate
    clause: "the VERSION_CONTROL_ALWAYS hard rule always triggers — an audit report that OMITS the version_control ship-gate sub-item entirely is not compliance, it is an unproven hard rule (F2, v1.22 self-review: hard rules are now driven generically from sop_applicability.yaml's hard_rules table, and an omitted item bites at the same severity as an explicit N/A)"
    source: PBAF-PROP-001 §3 Lever E (F2 fix)
    bad:
      args: ["tests/fixtures/as_version_control_omitted", "--state", "tests/fixtures/audit_state_good.yaml"]
      expect_severity: P1
      expect_contains: "AUDIT-STAGE-VERSION-CONTROL-ALWAYS"
    good:
      args: ["tests/fixtures/audit_good", "--state", "tests/fixtures/audit_state_good.yaml"]

  - id: AUDIT-STAGE-BACKUPS-WHEN-SENSITIVE
    check: audit
    kind: gate
    clause: "the BACKUPS_WHEN_SENSITIVE hard rule triggers whenever data is sensitive (A6) — an audit report that OMITS the backups_tested_restore ship-gate sub-item entirely is not compliance, it is an unproven hard rule (F2, v1.22 self-review)"
    source: PBAF-PROP-001 §3 Lever E (F2 fix)
    bad:
      args: ["tests/fixtures/as_backups_omitted", "--state", "tests/fixtures/audit_state_good.yaml"]
      expect_severity: P1
      expect_contains: "AUDIT-STAGE-BACKUPS-WHEN-SENSITIVE"
    good:
      args: ["tests/fixtures/audit_good", "--state", "tests/fixtures/audit_state_good.yaml"]

  - id: AUDIT-STAGE-FINAL-XFAM-REQUIRED
    check: audit
    kind: gate
    clause: "a FINAL audit with ZERO cross_family receipts fails closed — the ladder clauses only fire ON a cross-family receipt, so its total absence sailed through (order-only enforcement, fail-open); the typed escapes mirror the BF-PROP-005 stage_1 discipline exactly: xfam_capability_evidence (repo-relative manual scrubbed cross-family paste evidence) or an explicit ceo_decision_ref risk waiver (F7, v1.22 self-review; CEO ruling 2026-07-02)"
    source: "A-PROP-001 §3 Lever D / GATES.md BF-PROP-005 stage_1 (F7 fix, CEO ruling 2026-07-02)"
    bad:
      args: ["tests/fixtures/as_final_no_xfam", "--state", "tests/fixtures/audit_state_good.yaml", "--final"]
      expect_severity: P1
      expect_contains: "AUDIT-STAGE-FINAL-XFAM-REQUIRED"
    good:
      args: ["tests/fixtures/as_final_xfam_waiver", "--state", "tests/fixtures/audit_state_good.yaml", "--final",
             "--decision-ledger", "tests/fixtures/as_final_xfam_waiver/CEO-DECISION-LEDGER.md"]

  - id: AUDIT-STAGE-FACTS-MISSING
    check: audit
    kind: gate
    clause: "a missing build-fact (A1-A9) must fail closed, never silently default to false/E0 (X2, v1.22 xfam fix — schema validated BEFORE any evaluation logic touches the facts)"
    source: "PBAF-PROP-001 Rule 1 (X2 fix)"
    bad:
      args: ["tests/fixtures/as_facts_missing", "--state", "tests/fixtures/audit_state_good.yaml"]
      expect_severity: P1
      expect_contains: "AUDIT-STAGE-FACTS-MISSING"
    good:
      args: ["tests/fixtures/audit_good", "--state", "tests/fixtures/audit_state_good.yaml"]

  - id: AUDIT-STAGE-FACTS-TYPE
    check: audit
    kind: gate
    clause: "a boolean build-fact recorded as the STRING \"false\" is truthy in Python and would silently pass checks it should fail — facts A1-A4/A6-A9 must be real YAML booleans (X2, v1.22 xfam fix)"
    source: "PBAF-PROP-001 Rule 1 (X2 fix)"
    bad:
      args: ["tests/fixtures/as_facts_string_false", "--state", "tests/fixtures/audit_state_good.yaml"]
      expect_severity: P1
      expect_contains: "AUDIT-STAGE-FACTS-TYPE"
    good:
      args: ["tests/fixtures/audit_good", "--state", "tests/fixtures/audit_state_good.yaml"]

  - id: AUDIT-STAGE-FACTS-A5-INVALID
    check: audit
    kind: gate
    clause: "an A5 exposure-tier value outside {E0,E1,E2,E3} must fail closed, never fall back to E0 (X2, v1.22 xfam fix)"
    source: "PBAF-PROP-001 Rule 1 (X2 fix)"
    bad:
