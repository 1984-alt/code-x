  - id: MODULE-ACCEPTANCE-REPO-SHA-NOT-A-COMMIT-LIVE-SLICE-ACCEPT
    check: module-acceptance
    kind: gate
    clause: "live_slice_accept.repo_sha that is hex-shaped but NOT a real/reachable commit is fabrication (P0) [B-PROP-013 §2a/§5]"
    source: "B-PROP-013 §2a (forge-parity acceptance recompute)"
