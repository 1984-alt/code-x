  - id: MODULE-ACCEPTANCE-QUALITY-CARD-HASH-DRIFT
    check: module-acceptance
    kind: gate
    clause: "quality_card_hash != recomputed canonical hash of the inline quality_card block is drift, not fabrication — the block and its hash live in the same receipt (honest limit: drift/typo detection only) (P1) [B-PROP-013 §2b/§10.1]"
    source: "B-PROP-013 §2b (forge-parity acceptance recompute)"
    git_fixture: forge_parity_bad_qc_drift
    bad:
      args: ["--module-id=m1", "--state", "{STATE}", "--repo-root", "{REPO}"]
