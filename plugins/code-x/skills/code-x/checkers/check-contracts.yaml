    kind: gate
    clause: "the order wall reads the module order ONLY from the canonical <packet-dir>/MODULE-REGISTRY.yaml — pointing --registry at an external (out-of-packet) registry is rejected, so a builder cannot read order from a trimmed copy left outside the packet (P0) [V1.10 R4]"
