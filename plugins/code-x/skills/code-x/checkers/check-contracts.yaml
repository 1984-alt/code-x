# check-contracts.yaml — contract-bite harness manifest
# Every gate clause = a bad fixture the binary REJECTS + a good fixture it PASSES.
# Runner: checkers/tests/run_contracts.py (paths relative to checkers/).
# Source: FIX-SPEC-cx-round3-2026-06-09.md Part B.

clauses:

  # ──────────────────────────────────────────────────────────────
  # check: card
  # ──────────────────────────────────────────────────────────────

  - id: CARD-REQUIRED-SCALAR
    check: card
    kind: gate
    clause: "missing required scalar fields (mode, objective, model_tier, etc.) rejected"
    source: CX-CHECK-SPEC.md G1
    bad:
      args: ["tests/fixtures/card_bad_missing_field.yaml"]
      expect_severity: P0
    good:
      args: ["tests/fixtures/card_good.yaml"]

  - id: CARD-HIGH-RISK-FORCES-FOUNDATION
    check: card
    kind: gate
    clause: "a card_high_risk card (security_tripwire touches money/auth/secrets/PII/destructive) with foundation_checkpoint_required not 'yes' rejected — MECHANICAL, regardless of self-declaration or project risk tier (PBF-PROP-019 Phase 2, design v2 P0-1)"
    source: "PBF-PROP-019 (design-history/pbf-prop-019-tiered-strictness-2026-07-03.md Design Resolution v2, P0-1)"
    bad:
      args: ["tests/fixtures/card_bad_high_risk_no_foundation_checkpoint.yaml"]
      expect_severity: P0
      expect_contains: "CARD-HIGH-RISK-FORCES-FOUNDATION"
    good:
      args: ["tests/fixtures/card_good_high_risk_with_foundation_checkpoint.yaml"]

  - id: CARD-MODEL-TIER-NAMED
    check: card
    kind: gate
    clause: "model_tier must be a named standard/top/cheap tier, not custom string"
