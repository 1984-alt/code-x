  - id: BLUEPRINT-HIDDEN-SEVERITY-MALFORMED-ITEMS
    check: blueprint
    kind: gate
    clause: "CXBP-004: NO-HIDDEN-SEVERITY fails CLOSED when open_findings.items is not a list — a non-list items can no longer silently become an empty, passing state"
    source: "PROP-039 built-code xfam CXBP-004"
    bad:
      args: ["tests/fixtures/blueprint_good_packet", "--module", "home", "--state", "tests/fixtures/blueprint_bad_state_items_malformed.yaml", "--approval", "tests/fixtures/blueprint_good_approval.yaml"]
