      expect_contains: "canonical"
    good:
      args: ["tests/fixtures/card_module2_two_registry.yaml", "--packet-dir", "tests/fixtures/module_start_two_registry_packet", "--registry", "tests/fixtures/module_start_two_registry_packet/MODULE-REGISTRY.yaml", "--state", "tests/fixtures/state_modules_m1_accepted.yaml", "--repo-root", "tests/fixtures"]

