  - id: PROP-028-NO-REPO-SHA
    check: module-acceptance
    kind: gate
    clause: "a module-acceptance receipt missing repo_sha_before (and with no typed legacy_no_baseline carve-out) is rejected — the build-baseline binding needed to prove a real change shipped is absent (P1) [PROP-028]"
    source: "PROP-028 §phantom-completion guard / repo_sha_before"
    bad:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_no_repo_sha.yaml", "--acceptance", "tests/fixtures/module_acceptance_bad_no_repo_sha.yaml"]
