    kind: gate
    clause: "a ledger entry missing project_id/ship_commit(40-hex)/ship_date(ISO)/ship_timestamp_utc(ISO)/criteria(exactly the 7 keys)/evidence_manifest is unparseable and rejected P1 — never hand-ordered (EVAL-041 R1.3/R1.6)"
