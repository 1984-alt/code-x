    source: "PBF-PROP-019 Phase 3 (design v2.B row 1, cx_audit.collect_audit_findings tier read)"
    bad:
      args: ["tests/fixtures/as_no_audit_receipt", "--state", "tests/fixtures/audit_state_good.yaml"]
      expect_severity: P1
      expect_contains: "AUDIT-STAGE-ENTRY-REQUIRED"
    good:
      args: ["tests/fixtures/as_no_audit_receipt", "--state", "tests/fixtures/audit_state_good_lite.yaml"]

  - id: FINAL-READY-XFAM-LITE-NOT-REQUIRED
    check: final-ready
    kind: gate
    clause: "final_cross_family_receipt (+ audit_stage_final) missing is rejected under the default/STRICT risk_tier; a pure risk_tier: LITE build with ZERO high-risk cards fired does not require either — ships on self-review only (PBF-PROP-019 Phase 3, design v2.C CEO ruling 2026-07-05 Option A)"
    source: "PBF-PROP-019 Phase 3 (design v2.C, cx_final_ready tier + high-risk-fired read)"
    bad:
      args: ["tests/fixtures/state_bad_final_ready_strict_no_fcf.yaml"]
      expect_severity: P0
      expect_contains: "final_cross_family_receipt missing"
    good:
      # P0-2 FIX: high_risk_card_fired is recomputed from the build's real cards (fail-closed
      # if unresolvable) rather than a proxy field — the legitimate pure-LITE fast path must
      # point --cards-dir at a real, non-empty, all-clean cards directory.
      args: ["tests/fixtures/state_good_final_ready_lite_no_fcf.yaml",
             "--cards-dir", "tests/fixtures/final_ready_cards_lite_clean"]

  - id: FINAL-READY-XFAM-HIGH-RISK-FORCES-REQUIREMENT-EVEN-LITE
    check: final-ready
    kind: gate
    clause: "a risk_tier: LITE build in which a high-risk card fired (foundation_checkpoints_passed non-empty) STILL requires final_cross_family_receipt — the pure-LITE self-review-only ship path is for a build with ZERO high-risk cards only (PBF-PROP-019 Phase 3 invariant c)"
    source: "PBF-PROP-019 Phase 3 (design v2.C invariant c)"
    bad:
      args: ["tests/fixtures/state_bad_final_ready_lite_high_risk_fired_no_fcf.yaml"]
      expect_severity: P0
      expect_contains: "final_cross_family_receipt missing"
    good:
      args: ["tests/fixtures/state_good_final_ready.yaml"]

  - id: FINAL-READY-HIGH-RISK-CARD-RECOMPUTE-NOT-CHECKPOINT-PROXY
    check: final-ready
    kind: gate
    clause: "high_risk_card_fired is recomputed by enumerating the build's real compiled cards (--cards-dir / conventional <repo-root>/cards) via card_high_risk(), NOT the foundation_checkpoints_passed proxy — a LITE build containing a TERMINAL high-risk card (no dependents, so PB-PROP-002(b) never populates a checkpoint entry for it) still requires final_cross_family_receipt (P0-2 fix, cross-family finding 019f32cb)"
    source: "PBF-PROP-019 P0-2 FIX (GPT-5.5 xhigh codex 019f32cb built-code cross-review)"
    bad:
      args: ["tests/fixtures/state_good_final_ready_lite_no_fcf.yaml",
             "--cards-dir", "tests/fixtures/final_ready_cards_terminal_high_risk"]
      expect_severity: P0
      expect_contains: "final_cross_family_receipt missing"
    good:
      args: ["tests/fixtures/state_good_final_ready_lite_no_fcf.yaml",
             "--cards-dir", "tests/fixtures/final_ready_cards_lite_clean"]
