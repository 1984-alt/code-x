  - id: MODULE-START-PACKET-DIR-SYMLINK
    check: module-start
    kind: gate
    clause: "the packet ROOT itself being a symlink is rejected — a symlinked --packet-dir resolves to a directory OUTSIDE the intended packet (its files would be hashed as if frozen), so it is fail-closed before hashing (P0) [V1.10 R4]"
    source: "GPT R6 cross-review P0 (symlink-packet-root vector)"
    git_fixture: module_start_symlink_root
