  - id: ANDON-WALL-MALFORMED-FIELDS
    check: module-acceptance
    kind: gate
    clause: "acceptance receipt fields must be STRINGS — a malformed non-scalar (list/mapping) value (e.g. generated_by: [null], quality_card_hash: {x: y}) is treated as absent so the presence checks fail closed; str-coercion used to let malformed values satisfy them (P0) [V1.10 R4]"
    source: "GPT R12 cross-review P0 (type-coercion of malformed receipt fields)"
    bad:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_malformed.yaml", "--acceptance", "tests/fixtures/module_acceptance_malformed_fields.yaml"]
      expect_severity: P0
      expect_contains: "generated_by"
    good:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_good.yaml", "--acceptance", "tests/fixtures/module_acceptance_good.yaml"]

  - id: ANDON-WALL-EXTERNAL-REF
    check: module-acceptance
    kind: gate
    clause: "the recorded acceptance_ref must be a repo-relative, non-symlink path resolving INSIDE the repo — an absolute / '..' / symlink / outside-repo ref would let the Andon wall read arbitrary external bytes as the receipt (P0) [V1.10 R4]"
    source: "GPT R11 cross-review P0 (external acceptance_ref path-safety)"
    git_fixture: module_acceptance_external_ref
    bad:
      args: ["--module-id=m1", "--state", "{STATE}", "--repo-root", "{REPO}"]
      expect_severity: P0
      expect_contains: "repo-relative"
    good:
      git_fixture: module_acceptance_inrepo_ref
      args: ["--module-id=m1", "--state", "{STATE}", "--repo-root", "{REPO}"]

  - id: ANDON-WALL-NO-MODULE-ID
    check: module-acceptance
    kind: gate
    clause: "a sha-bound acceptance receipt that OMITS module_id is rejected — it does not identify the module it accepts, so a module-less bound blob would 'accept' ANY module (enforced-path order-wall bypass); the receipt's module_id must be present and match (P0) [V1.10 R4]"
    source: "GPT R10 cross-review P0 (module-less acceptance receipt)"
    bad:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_no_module_id.yaml", "--acceptance", "tests/fixtures/module_acceptance_no_module_id.yaml"]
      expect_severity: P0
      expect_contains: "no module_id"
    good:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_good.yaml", "--acceptance", "tests/fixtures/module_acceptance_good.yaml"]

  - id: ANDON-WALL-VERDICT-NOT-ACCEPTED
    check: module-acceptance
    kind: gate
    clause: "acceptance receipt whose verdict is not 'accepted' does not unlock the next module (P0) [V1.10]"
    source: "Rev d §module_acceptance / Andon receipt"
    bad:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_pending.yaml", "--acceptance", "tests/fixtures/module_acceptance_bad_verdict_pending.yaml"]
      expect_severity: P0
      expect_contains: "not 'accepted'"
    good:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_good.yaml", "--acceptance", "tests/fixtures/module_acceptance_good.yaml"]

