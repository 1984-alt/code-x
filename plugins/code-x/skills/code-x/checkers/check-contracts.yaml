  - id: BLUEPRINT-REVIEW-REF-MISSING-FILE
    check: blueprint
    kind: gate
    clause: "CXBP-003: review_ref must path-safe-resolve to a review file that EXISTS next to the approval — a non-existent review_ref is not a review (good fixture now points at a real file)"
    source: "PROP-039 built-code xfam CXBP-003"
    bad:
      args: ["tests/fixtures/blueprint_good_packet", "--module", "home", "--state", "tests/fixtures/blueprint_good_state.yaml", "--approval", "tests/fixtures/blueprint_bad_review_ref_missing.yaml"]
      expect_severity: P1
      expect_contains: "no real review file"
    good:
      args: ["tests/fixtures/blueprint_good_packet", "--module", "home", "--state", "tests/fixtures/blueprint_good_state.yaml", "--approval", "tests/fixtures/blueprint_good_approval.yaml"]

  - id: BLUEPRINT-REVIEW-SAME-FAMILY
    check: blueprint
    kind: gate
    clause: "CXBP-003: reviewer_family must be the OPPOSITE cross-family group of the builder — a same-family review (builder anthropic, reviewer claude) is a blind-spot, not a cross-family catch"
    source: "PROP-039 built-code xfam CXBP-003"
    bad:
      args: ["tests/fixtures/blueprint_good_packet", "--module", "home", "--state", "tests/fixtures/blueprint_good_state.yaml", "--approval", "tests/fixtures/blueprint_bad_review_same_family.yaml"]
