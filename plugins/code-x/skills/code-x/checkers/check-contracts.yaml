      args: ["--module-id=m1", "--state", "{STATE}", "--repo-root", "{REPO}"]

  - id: PACKET-FORGE-PARITY-MARKER-REQUIRED
    check: packet
    kind: gate
    clause: "a NEW packet's requirements-manifest.yaml without b_prop_013_forge_parity: true FAILS at the WRITING floor — the ships-dark closer; absence would ride the legacy acceptance path forever, making 'on now' on-paper only. --legacy-migration exempts a genuinely in-flight, already-frozen project (P1) [B-PROP-013 §4]"
    source: "B-PROP-013 §4 (forge-parity acceptance recompute, council fix #1)"
    bad:
      args: ["tests/fixtures/packet_bad_forge_parity_marker_absent"]
      expect_severity: P1
      expect_contains: "PACKET-FORGE-PARITY-MARKER-REQUIRED"
    good:
      args: ["tests/fixtures/packet_good"]

  - id: PACKET-FORGE-PARITY-MARKER-LEGACY-MIGRATION-REQUIRES-PROOF
    check: packet
    kind: gate
    clause: "a BARE --legacy-migration with NO --migration-ref and no pre-existing frozen MODULE-REGISTRY.yaml hash does NOT waive — it is not a blanket self-waiver; the marker-required clause still FAILS (P1) [B-PROP-013 §4, xfam FIX-FIRST]"
    source: "B-PROP-013 §4 (forge-parity acceptance recompute, FIX-FIRST P1 — bare flag was an unconditional self-waiver before)"
    bad:
      args: ["tests/fixtures/packet_bad_forge_parity_marker_absent", "--legacy-migration"]
      expect_severity: P1
      expect_contains: "PACKET-FORGE-PARITY-MARKER-REQUIRED"
    good:
      args: ["tests/fixtures/packet_bad_forge_parity_marker_absent", "--legacy-migration", "--migration-ref", "CEO-D-001"]

  - id: PACKET-FORGE-PARITY-MARKER-LEGACY-MIGRATION-EXEMPT
    check: packet
    kind: gate
    clause: "the SAME marker-absent packet passes with --legacy-migration WHEN it also carries a resolvable --migration-ref (a real MEMORY/CEO-DECISION-LEDGER.md row) — the CEO-locked grandfather carve-out for in-flight already-shipped apps (never for a new packet, and never on a bare unproven flag) [B-PROP-013 §4]"
    source: "B-PROP-013 §4 (forge-parity acceptance recompute, grandfather carve-out, FIX-FIRST-hardened with proof)"
    good:
      args: ["tests/fixtures/packet_bad_forge_parity_marker_absent", "--legacy-migration", "--migration-ref", "CEO-D-001"]

  - id: CX-ACCEPT-NO-CEO-TOKEN
    check: accept
    kind: gate
    clause: "cx-accept refuses to stamp verdict: accepted without a ceo_accept_token embedding the recomputed HEAD prefix — a self-filling stamper must not bypass the human accept that keeps long-autonomous OFF (P0/refuse) [B-PROP-013 §3.2, CHARTER L80-84]"
    source: "B-PROP-013 §3 (the STAMPER, council fix #4)"
    git_fixture: cx_accept_no_token
    bad:
      args: ["--draft", "{REPO}/draft.yaml", "--state", "{STATE}", "--repo-root", "{REPO}", "--out", "{REPO}/out.yaml"]
      expect_severity: P0
      expect_contains: "CX-ACCEPT-NO-CEO-TOKEN"
    good:
      git_fixture: cx_accept_good_token
      args: ["--draft", "{REPO}/draft.yaml", "--state", "{STATE}", "--repo-root", "{REPO}", "--out", "{REPO}/out.yaml"]

  - id: CX-ACCEPT-NO-CEO-TOKEN-SHORT-PREFIX
    check: accept
