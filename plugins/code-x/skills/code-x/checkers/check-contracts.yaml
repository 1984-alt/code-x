      expect_severity: P1
      expect_contains: "SELF_REVIEW"
    good:
      args: ["tests/fixtures/card_self_review_good_rfc3.yaml"]

  - id: MODULE-START-OUT-OF-ORDER
    check: module-start
    kind: gate
    clause: "module-advancing card blocked until every prior required module is accepted (P0 order wall) [V1.10]"
    source: "Rev d §module_acceptance / module-start"
    bad:
      args: ["tests/fixtures/card_module3_start.yaml", "--packet-dir", "tests/fixtures/module_start_good_packet", "--registry", "tests/fixtures/module_start_good_packet/MODULE-REGISTRY.yaml", "--state", "tests/fixtures/state_modules_m1_accepted.yaml", "--repo-root", "tests/fixtures"]
      expect_severity: P0
      expect_contains: "prior required module"
    good:
      args: ["tests/fixtures/card_module2_start.yaml", "--packet-dir", "tests/fixtures/module_start_good_packet", "--registry", "tests/fixtures/module_start_good_packet/MODULE-REGISTRY.yaml", "--state", "tests/fixtures/state_modules_m1_accepted.yaml", "--repo-root", "tests/fixtures"]

  - id: MODULE-START-UNKNOWN-ID
    check: module-start
    kind: gate
    clause: "card whose module_id is not in the frozen registry is blocked (P0) [V1.10]"
    source: "Rev d §module_acceptance / module-start"
    bad:
      args: ["tests/fixtures/card_module_unknown.yaml", "--packet-dir", "tests/fixtures/module_start_good_packet", "--registry", "tests/fixtures/module_start_good_packet/MODULE-REGISTRY.yaml", "--state", "tests/fixtures/state_modules_m1_accepted.yaml", "--repo-root", "tests/fixtures"]
