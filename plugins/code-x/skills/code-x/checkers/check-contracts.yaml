    check: module-acceptance
    kind: gate
    clause: "a module-acceptance receipt whose repo_sha_before is malformed (not hex / <12 chars) is rejected — the build-baseline binding is unusable so the phantom-completion guard cannot run (P1) [PROP-028]"
    source: "PROP-028 §phantom-completion guard / repo_sha_before"
    bad:
      args: ["--module-id=m1", "--state", "tests/fixtures/state_module_accepted_malformed_repo_sha.yaml", "--acceptance", "tests/fixtures/module_acceptance_bad_malformed_repo_sha.yaml"]
