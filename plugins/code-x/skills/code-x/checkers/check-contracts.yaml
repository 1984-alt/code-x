    bad:
      args: ["--ledger", "tests/fixtures/graduation_bad_streak.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]
      expect_severity: P0
      expect_contains: "GRADUATION-STREAK-UNPROVEN"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-ENTRY-RECEIPT-UNBOUND
