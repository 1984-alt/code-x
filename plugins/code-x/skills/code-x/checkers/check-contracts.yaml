    kind: gate
    clause: "a criterion's snapshotted receipt is unreachable, or its full sha256 does not match the declared receipt_sha256 — the entry is NOT clean (fail-closed anti-forge; a forged/swapped/hand-edited receipt is rejected P0) (EVAL-041 R1.4)"
    source: "design-history/eval041-reliability-bar-graduation-gate-spec-2026-07-01.md R1.2/R1.4"
    bad:
