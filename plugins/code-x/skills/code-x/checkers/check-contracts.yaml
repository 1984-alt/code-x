      expect_contains: "GRADUATION-ENTRY-RECEIPT-UNBOUND"
    good:
      args: ["--ledger", "tests/fixtures/graduation_good_authorized.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]

  - id: GRADUATION-ENTRY-CRITERION-UNMET
    check: graduation
    kind: gate
    clause: "a criterion re-derives UNMET from its snapshotted receipt's REAL fields (never a self-declared flag) — the entry is NOT clean, surfacing a false clean-claim P1 (EVAL-041 R1.2)"
    source: "design-history/eval041-reliability-bar-graduation-gate-spec-2026-07-01.md R1.2"
    bad:
      args: ["--ledger", "tests/fixtures/graduation_bad_criterion.md", "--decision-ledger", "tests/fixtures/graduation_decision_ledger_authorized.md", "--authorize-decision", "CEO-D-901"]
