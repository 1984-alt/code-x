    bad:
      args: ["tests/fixtures/card_module2_start.yaml", "--packet-dir", "tests/fixtures/module_start_good_packet", "--registry", "tests/fixtures/module_registry_good.yaml", "--state", "tests/fixtures/state_modules_m1_accepted.yaml", "--repo-root", "tests/fixtures"]
